services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: acopia-db
    environment:
      POSTGRES_USER: acopia
      POSTGRES_PASSWORD: acopia
      POSTGRES_DB: acopia
    ports:
      - "5432:5432"
    volumes:
      - acopia_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acopia"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  acopia_pgdata:
