# Observatorio (ADR-012, enmienda .1): construye el sitio estático desde el caché
# versionado `datos/erv/*.xlsx` y lo publica en GitHub Pages.
#
# El plan original descargaba los XLSX en el runner, pero el sitio del Coordinador
# está tras Cloudflare y desafía a las IPs de datacenter con "Just a moment..."
# (HTTP 403) — no hay descarga honesta posible desde CI (docs/TROUBLESHOOTING.md).
# El caché se refresca LOCALMENTE (IP residencial pasa sin challenge) y se pushea;
# el push del caché redespliega el sitio.
#
# Refresco mensual local (Git Bash, desde la raíz del repo):
#   UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0 Safari/537.36"
#   curl -sL -A "$UA" "https://www.coordinador.cl/operacion/documentos/reducciones-de-generacion-renovable/reducciones-erv-$(date +%Y)/" \
#     | grep -oE 'https://[^"]*Reducciones-de-Energia[^"]*\.xlsx' | sort -u \
#     | while read -r url; do curl -sL -A "$UA" -o "datos/erv/$(basename "$url")" "$url"; done
#   git add datos/erv && git commit -m "data(erv): mes nuevo" && git push
#
# Requisito único de configuración: Settings → Pages → fuente "GitHub Actions".

name: observatorio

on:
  push:
    branches: [main]
    paths:
      - "datos/erv/**"
      - "src/acopia/interfaces/observatorio/**"
      - "src/acopia/interfaces/rest/dashboard.py"
      - ".github/workflows/observatorio.yml"
  schedule:
    - cron: "0 12 5 * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar acopia (core + ingesta)
        run: pip install -e ".[ingesta]"

      - name: Generar el sitio desde el caché
        run: |
          ls -la datos/erv/
          acopia-datos observatorio --reducciones datos/erv/*.xlsx --salida _sitio

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _sitio

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
